<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTU — Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --azul:      #1e3a5f;
      --azul-med:  #2c5282;
      --acento:    #4a9eff;
      --claro:     #f0f4f8;
    }
    body {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-med) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card-login {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-area .icono {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--azul), var(--acento));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem; color: white;
    }
    .logo-area h1 {
      font-size: 1.5rem; font-weight: 700;
      color: var(--azul); margin-bottom: 0.25rem;
    }
    .logo-area p { color: #6b7280; font-size: 0.9rem; }

    .form-label { font-weight: 600; color: #374151; font-size: 0.875rem; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e5e7eb;
      padding: 0.65rem 1rem; transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: var(--acento);
      box-shadow: 0 0 0 3px rgba(74,158,255,0.15);
    }
    .btn-login {
      background: linear-gradient(135deg, var(--azul), var(--azul-med));
      border: none; color: white; font-weight: 600;
      padding: 0.75rem; border-radius: 8px;
      font-size: 1rem; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
    .btn-login:disabled { opacity: 0.6; }

    .link-registro { color: var(--acento); font-weight: 600; text-decoration: none; }
    .link-registro:hover { text-decoration: underline; }
    .alerta { border-radius: 8px; font-size: 0.875rem; }
  </style>
</head>
<body>
<div class="card-login">

  <div class="logo-area">
    <div class="icono"><i class="bi bi-mortarboard-fill"></i></div>
    <h1>GTU</h1>
    <p>Gestor de Tareas Universitarias</p>
  </div>

  <div id="alerta" class="alert alerta d-none"></div>

  <form id="formLogin" novalidate>
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-envelope"></i>
        </span>
        <input type="email" id="correo" class="form-control border-start-0"
               placeholder="tu@correo.com" required>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-lock"></i>
        </span>
        <input type="password" id="password" class="form-control border-start-0"
               placeholder="••••••••" required>
        <button type="button" class="btn btn-light border"
                onclick="togglePassword('password', this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-login w-100" id="btnLogin">
      <span id="btnTexto"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión</span>
      <span id="btnCarga" class="d-none">
        <span class="spinner-border spinner-border-sm me-2"></span>Verificando...
      </span>
    </button>
  </form>

  <hr class="my-4">
  <p class="text-center text-muted mb-0" style="font-size:0.875rem">
    ¿No tienes cuenta?
    <a href="registro.html" class="link-registro">Regístrate aquí</a>
  </p>
</div>

<script>
  const API = 'http://localhost:3000';

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<i class="bi bi-eye"></i>';
    }
  }

  function mostrarAlerta(mensaje, tipo) {
    const alerta = document.getElementById('alerta');
    alerta.className = `alert alerta alert-${tipo}`;
    alerta.innerHTML = `<i class="bi bi-${tipo === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${mensaje}`;
    alerta.classList.remove('d-none');
  }

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();

    const correo   = document.getElementById('correo').value.trim();
    const password = document.getElementById('password').value;

    if (!correo || !password) {
      mostrarAlerta('Por favor completa todos los campos', 'warning');
      return;
    }

    // Mostrar carga
    document.getElementById('btnTexto').classList.add('d-none');
    document.getElementById('btnCarga').classList.remove('d-none');
    document.getElementById('btnLogin').disabled = true;

    try {
      const resp = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ correo, password })
      });

      const data = await resp.json();

      if (!resp.ok) {
        mostrarAlerta(data.error || 'Error al iniciar sesión', 'danger');
        return;
      }

      // Guardar token y datos del usuario
      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify({
        nombre: data.nombre,
        correo: data.correo
      }));

      mostrarAlerta('¡Bienvenido! Redirigiendo...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);

    } catch (err) {
      mostrarAlerta('No se pudo conectar con el servidor. ¿Está corriendo Docker?', 'danger');
    } finally {
      document.getElementById('btnTexto').classList.remove('d-none');
      document.getElementById('btnCarga').classList.add('d-none');
      document.getElementById('btnLogin').disabled = false;
    }
  });

  // Si ya hay sesión activa, ir directo al dashboard
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
