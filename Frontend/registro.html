<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTU — Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --azul: #1e3a5f; --azul-med: #2c5282; --acento: #4a9eff; }
    body {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-med) 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; padding: 2rem 0;
    }
    .card-registro {
      background: white; border-radius: 16px; padding: 2.5rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo-area { text-align: center; margin-bottom: 2rem; }
    .logo-area .icono {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--azul), var(--acento));
      border-radius: 16px; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 1.8rem; color: white;
    }
    .logo-area h1 { font-size: 1.5rem; font-weight: 700; color: var(--azul); margin-bottom: 0.25rem; }
    .logo-area p { color: #6b7280; font-size: 0.9rem; }
    .form-label { font-weight: 600; color: #374151; font-size: 0.875rem; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e5e7eb;
      padding: 0.65rem 1rem; transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: var(--acento);
      box-shadow: 0 0 0 3px rgba(74,158,255,0.15);
    }
    .btn-registro {
      background: linear-gradient(135deg, var(--azul), var(--azul-med));
      border: none; color: white; font-weight: 600;
      padding: 0.75rem; border-radius: 8px; font-size: 1rem;
    }
    .btn-registro:hover { opacity: 0.9; color: white; }
    .req { font-size: 0.75rem; color: #9ca3af; margin-top: 0.25rem; }
    .req.ok { color: #10b981; }
    .req.error { color: #ef4444; }
    .link-login { color: var(--acento); font-weight: 600; text-decoration: none; }
    .link-login:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card-registro">

  <div class="logo-area">
    <div class="icono"><i class="bi bi-person-plus-fill"></i></div>
    <h1>Crear cuenta</h1>
    <p>Completa los datos para registrarte</p>
  </div>

  <div id="alerta" class="alert d-none" style="border-radius:8px;font-size:0.875rem"></div>

  <form id="formRegistro" novalidate>
    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-person"></i>
        </span>
        <input type="text" id="nombre" class="form-control border-start-0"
               placeholder="Juan Pérez" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-envelope"></i>
        </span>
        <input type="email" id="correo" class="form-control border-start-0"
               placeholder="juan@universidad.edu.co" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-lock"></i>
        </span>
        <input type="password" id="password" class="form-control border-start-0"
               placeholder="Mínimo 6 caracteres" required oninput="validarPassword()">
        <button type="button" class="btn btn-light border"
                onclick="togglePassword('password', this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
      <div class="req" id="reqPassword">
        <i class="bi bi-circle me-1"></i>Mínimo 6 caracteres
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Confirmar contraseña</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-lock-fill"></i>
        </span>
        <input type="password" id="confirmar" class="form-control border-start-0"
               placeholder="Repite tu contraseña" required oninput="validarConfirmar()">
        <button type="button" class="btn btn-light border"
                onclick="togglePassword('confirmar', this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
      <div class="req" id="reqConfirmar">
        <i class="bi bi-circle me-1"></i>Debe coincidir con la contraseña
      </div>
    </div>

    <button type="submit" class="btn btn-registro w-100" id="btnReg">
      <span id="btnTexto"><i class="bi bi-person-check me-2"></i>Crear cuenta</span>
      <span id="btnCarga" class="d-none">
        <span class="spinner-border spinner-border-sm me-2"></span>Registrando...
      </span>
    </button>
  </form>

  <hr class="my-4">
  <p class="text-center text-muted mb-0" style="font-size:0.875rem">
    ¿Ya tienes cuenta?
    <a href="login.html" class="link-login">Inicia sesión</a>
  </p>
</div>

<script>
  const API = 'http://localhost:3000';

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.innerHTML = input.type === 'password'
      ? '<i class="bi bi-eye"></i>'
      : '<i class="bi bi-eye-slash"></i>';
  }

  function validarPassword() {
    const val = document.getElementById('password').value;
    const req  = document.getElementById('reqPassword');
    if (val.length >= 6) {
      req.className = 'req ok';
      req.innerHTML = '<i class="bi bi-check-circle me-1"></i>Contraseña válida';
    } else {
      req.className = 'req error';
      req.innerHTML = '<i class="bi bi-x-circle me-1"></i>Mínimo 6 caracteres';
    }
  }

  function validarConfirmar() {
    const pass = document.getElementById('password').value;
    const conf = document.getElementById('confirmar').value;
    const req  = document.getElementById('reqConfirmar');
    if (conf && pass === conf) {
      req.className = 'req ok';
      req.innerHTML = '<i class="bi bi-check-circle me-1"></i>Las contraseñas coinciden';
    } else {
      req.className = 'req error';
      req.innerHTML = '<i class="bi bi-x-circle me-1"></i>No coinciden';
    }
  }

  function mostrarAlerta(mensaje, tipo) {
    const alerta = document.getElementById('alerta');
    alerta.className = `alert alert-${tipo}`;
    alerta.style.borderRadius = '8px';
    alerta.style.fontSize = '0.875rem';
    alerta.innerHTML = `<i class="bi bi-${tipo === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${mensaje}`;
    alerta.classList.remove('d-none');
  }

  document.getElementById('formRegistro').addEventListener('submit', async (e) => {
    e.preventDefault();

    const nombre   = document.getElementById('nombre').value.trim();
    const correo   = document.getElementById('correo').value.trim();
    const password = document.getElementById('password').value;
    const confirmar = document.getElementById('confirmar').value;

    if (!nombre || !correo || !password || !confirmar) {
      mostrarAlerta('Por favor completa todos los campos', 'warning');
      return;
    }
    if (password.length < 6) {
      mostrarAlerta('La contraseña debe tener mínimo 6 caracteres', 'warning');
      return;
    }
    if (password !== confirmar) {
      mostrarAlerta('Las contraseñas no coinciden', 'warning');
      return;
    }

    document.getElementById('btnTexto').classList.add('d-none');
    document.getElementById('btnCarga').classList.remove('d-none');
    document.getElementById('btnReg').disabled = true;

    try {
      const resp = await fetch(`${API}/registro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, correo, password })
      });

      const data = await resp.json();

      if (!resp.ok) {
        mostrarAlerta(data.error || 'Error al registrarse', 'danger');
        return;
      }

      mostrarAlerta('¡Cuenta creada! Redirigiendo al login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);

    } catch (err) {
      mostrarAlerta('No se pudo conectar con el servidor', 'danger');
    } finally {
      document.getElementById('btnTexto').classList.remove('d-none');
      document.getElementById('btnCarga').classList.add('d-none');
      document.getElementById('btnReg').disabled = false;
    }
  });
</script>
</body>
</html>
