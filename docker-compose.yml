services:

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gtu-network

  usuarios:
    build: ./Usuarios
    depends_on:
      - mongodb
    ports:
      - "3001:3001"
    networks:
      - gtu-network

  materias:
    build: ./Materias
    depends_on:
      - mongodb
    ports:
      - "3002:3002"
    networks:
      - gtu-network

  tareas:
    build: ./Tareas
    depends_on:
      - mongodb
      - materias
    ports:
      - "3003:3003"
    networks:
      - gtu-network

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - usuarios
      - materias
      - tareas
    networks:
      - gtu-network

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - gtu-network

networks:
  gtu-network:

volumes:
  mongo-data: